<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Elegant Landing Page Builder</title>

    <meta
      name="description"
      content="Create beautiful, modern landing pages with a simple visual builder."
    />

    <link rel="icon" href="/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f8f6f2;
        --text: #1f2937;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: "Inter", sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(255,255,255,0.9),
            transparent 40%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(220,220,220,0.25),
            transparent 35%
          ),
          var(--bg);

        color: var(--text);
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
      }

      .preloader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      .preloader h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: 0.08em;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="preloader">
        <h1>Landing Builder</h1>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
